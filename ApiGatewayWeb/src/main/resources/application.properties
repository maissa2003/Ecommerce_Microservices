spring.application.name=ApiGatewayWeb

server.port=8080

# Routes
spring.cloud.gateway.routes[0].id=ms_user
spring.cloud.gateway.routes[0].uri=lb://MS_USER
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[1].id=ms_article
spring.cloud.gateway.routes[1].uri=lb://MS_ARTICLE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/articles/**

spring.cloud.gateway.routes[2].id=ms_category
spring.cloud.gateway.routes[2].uri=lb://MS_CATEGORY
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/categories/**

spring.cloud.gateway.routes[3].id=ms_order
spring.cloud.gateway.routes[3].uri=lb://MS_ORDER
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/orders/**

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
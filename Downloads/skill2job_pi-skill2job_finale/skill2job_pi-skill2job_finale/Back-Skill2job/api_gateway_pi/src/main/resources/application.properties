spring.application.name=api_gateway_pi
server.port=8090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Pure property-based CORS configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposedHeaders=Authorization,Content-Disposition
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

# ── Routes ────────────────────────────────────────────────────────────────────
spring.cloud.gateway.routes[0].id=exams-service
spring.cloud.gateway.routes[0].uri=lb://exams-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/exams/**

spring.cloud.gateway.routes[1].id=session-service
spring.cloud.gateway.routes[1].uri=lb://session-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/session/**


spring.cloud.gateway.routes[2].id=user-management-service
spring.cloud.gateway.routes[2].uri=lb://gestionuser
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[3].id=admin-users-service
spring.cloud.gateway.routes[3].uri=lb://gestionuser
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/admin/users/**, /api/admin/dashboard/**

spring.cloud.gateway.routes[4].id=formation-service
spring.cloud.gateway.routes[4].uri=lb://formation-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/formations/**
# $${segment} — escape so Spring does not treat ${segment} as a placeholder (would break rewrite → 404)
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/formations/(?<segment>.*),/api/$${segment}

# Direct routes to formation-service (same paths as GestionFormation controllers; no rewrite)

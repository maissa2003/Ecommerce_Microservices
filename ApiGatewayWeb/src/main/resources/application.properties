spring.application.name=ApiGatewayWeb

server.port=8080

# CORS Configuration (Gateway-level)
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allow-credentials=true

# LoadBalancer Configuration
spring.cloud.loadbalancer.ribbon.enabled=false
spring.cloud.loadbalancer.cache.enabled=true

# Routes - using direct container DNS names instead of load balancer
spring.cloud.gateway.routes[0].id=ms_category
spring.cloud.gateway.routes[0].uri=http://ms-category:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/categories/**

spring.cloud.gateway.routes[1].id=ms_order
spring.cloud.gateway.routes[1].uri=http://ms-order:8084
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.routes[2].id=ms_article
spring.cloud.gateway.routes[2].uri=http://ms-article:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/articles/**

# Eureka (optional - can be disabled if not needed for discovery)
eureka.client.enabled=false
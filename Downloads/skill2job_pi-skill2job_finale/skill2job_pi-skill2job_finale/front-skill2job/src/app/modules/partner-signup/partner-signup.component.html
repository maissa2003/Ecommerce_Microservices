<div class="partner-container">
  <h2>Become a Partner</h2>
  <p class="subtitle">
    Create your account and submit your company for approval.
  </p>
  <div class="back-container">
    <button type="button" class="btn-back" (click)="goToLanding()">
      ← Back to Home
    </button>
  </div>

  <form (ngSubmit)="submit()" #partnerForm="ngForm">
    <!-- ================= PERSONAL INFO ================= -->
    <h3 class="section-title">Personal Information</h3>

    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" [(ngModel)]="form.username" required />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" [(ngModel)]="form.email" required />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        name="password"
        [(ngModel)]="form.password"
        required
        minlength="6"
      />
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input
        type="password"
        name="confirmPassword"
        [(ngModel)]="form.confirmPassword"
        required
      />
    </div>

    <!-- ================= COMPANY INFO ================= -->
    <h3 class="section-title">Company Information</h3>

    <div class="form-group">
      <label>Company Name</label>
      <input
        type="text"
        name="companyName"
        [(ngModel)]="form.companyName"
        required
      />
    </div>

    <div class="form-group">
      <label>Industry</label>
      <input type="text" name="industry" [(ngModel)]="form.industry" required />
    </div>

    <div class="form-group">
      <label>Company Email</label>
      <input
        type="email"
        name="companyEmail"
        [(ngModel)]="form.companyEmail"
        required
      />
    </div>

    <div class="form-group">
      <label>Phone</label>
      <input type="text" name="phone" [(ngModel)]="form.phone" required />
    </div>

    <div class="form-group">
      <label>Address</label>
      <input type="text" name="address" [(ngModel)]="form.address" required />
    </div>

    <div class="form-group">
      <label>Website</label>
      <input type="text" name="website" [(ngModel)]="form.website" />
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea
        name="description"
        [(ngModel)]="form.description"
        rows="4"
      ></textarea>
    </div>

    <button
      type="submit"
      class="btn-primary"
      [disabled]="loading || !partnerForm.valid"
    >
      {{ loading ? "Submitting..." : "Submit Request" }}
    </button>
  </form>

  <div class="success" *ngIf="successMessage">
    {{ successMessage }}
  </div>

  <div class="error" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>
</div>

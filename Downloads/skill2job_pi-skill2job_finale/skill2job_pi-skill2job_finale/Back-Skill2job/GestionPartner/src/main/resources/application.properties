spring.application.name=partner-service
server.port=8086

# ? MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/Skill2Job?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ? JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Auto shortlisting
app.auto-shortlist.enabled=true
app.auto-shortlist.threshold=75

# ? JWT (secret doit faire minimum 512 bits = 64 caract�res pour HS512)
app.jwt.secret=VotreSecretKeyTresLongueEtSecurisee1234567890ABCDEFabcdefghijklmnop
app.jwt.expiration=86400000

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
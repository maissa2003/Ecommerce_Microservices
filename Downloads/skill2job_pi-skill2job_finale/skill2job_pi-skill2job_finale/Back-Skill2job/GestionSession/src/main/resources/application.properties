spring.application.name=session-service
server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3306/session_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.jwt.secret=VotreSecretKeyTresLongueEtSecurisee1234567890ABCDEFabcdefghijklmnop
app.jwt.expiration=86400000

logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
<div class="form-container">
  <h2>Add Equipment</h2>

  <div class="form-group">
    <label>Name</label>
    <input type="text" [(ngModel)]="name" />
  </div>

  <div class="form-group">
    <label>Quantity</label>
    <input type="number" [(ngModel)]="quantity" />
  </div>

  <div class="form-group">
    <label>Picture</label>
    <input type="file" (change)="onFileSelected($event)" />
  </div>

  <!-- Image preview -->
  <img *ngIf="preview" [src]="preview" class="preview" />

  <button (click)="submit()" class="save-btn">
    Save
  </button>
  <button routerLink="/trainer-sessions/equipments" class="cancel-btn">
    Cancel
  </button>
</div>

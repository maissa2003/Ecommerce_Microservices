<h2 class="page-title">My Offers</h2>

<p class="msg" *ngIf="msg">{{ msg }}</p>

<div *ngIf="partner" class="grid">
  <!-- ================= FORM ================= -->
  <div class="card form-card">
    <h3>{{ editingId ? "Edit Offer" : "Create Offer" }}</h3>

    <div class="form-group">
      <label>Title</label>
      <input [(ngModel)]="form.title" placeholder="Enter offer title" />
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea
        [(ngModel)]="form.description"
        placeholder="Describe the offer"
      ></textarea>
    </div>

    <div class="form-group">
      <label>Location</label>
      <input [(ngModel)]="form.location" placeholder="City / Country" />
    </div>

    <div class="form-group">
      <label>Type</label>
      <select [(ngModel)]="form.type">
        <option value="INTERNSHIP">Internship</option>
        <option value="JOB">Job</option>
      </select>
    </div>

    <div class="form-group">
      <label>Mode</label>
      <select [(ngModel)]="form.mode">
        <option value="ONSITE">Onsite</option>
        <option value="REMOTE">Remote</option>
        <option value="HYBRID">Hybrid</option>
      </select>
    </div>

    <div class="form-group">
      <label>Requirements</label>
      <textarea
        [(ngModel)]="form.requirements"
        placeholder="Skills, experience..."
      ></textarea>
    </div>

    <div class="form-group">
      <label>Deadline</label>
      <input type="date" [(ngModel)]="form.deadline" />
    </div>

    <div class="actions">
      <button (click)="submit()">
        {{ editingId ? "Update Offer" : "Create Offer" }}
      </button>
      <button class="secondary" *ngIf="editingId" (click)="resetForm()">
        Cancel
      </button>
    </div>
  </div>

  <!-- ================= LIST ================= -->
  <div class="card list-card">
    <h3>Offers List</h3>

    <div class="offer-card" *ngFor="let o of offers">
      <div class="offer-header">
        <div>
          <h4>{{ o.title }}</h4>
          <div class="chips">
            <span class="chip">{{ o.type }}</span>
            <span class="chip">{{ o.mode }}</span>
            <span class="chip muted">{{ o.location }}</span>
          </div>
        </div>

        <span class="status" [class.closed]="o.status === 'CLOSED'">
          {{ o.status }}
        </span>
      </div>

      <p class="desc">{{ o.description }}</p>

      <div class="meta">
        <div>
          <small class="meta-label">Deadline</small>
          <div>{{ o.deadline }}</div>
        </div>

        <div *ngIf="o.requirements">
          <small class="meta-label">Requirements</small>
          <div>{{ o.requirements }}</div>
        </div>
      </div>

      <div class="actions">
        <button class="small secondary" (click)="edit(o)">Edit</button>
        <button class="small danger" (click)="remove(o.id)">Delete</button>
        <button class="small" (click)="toggleStatus(o)">
          {{ o.status === "CLOSED" ? "Reopen" : "Close" }}
        </button>
        <button
          class="btn ghost"
          [routerLink]="['/partner/offers', o.id, 'applications']"
        >
          View Applications
        </button>
      </div>
    </div>

    <p class="empty" *ngIf="offers.length === 0">No offers yet.</p>
  </div>
</div>
